# xcodegen 專案定義：`xcodegen generate` 重生 TrainingLa.xcodeproj（xcodeproj 不進版控）
name: TrainingLa
options:
  bundleIdPrefix: com.wly-p
  deploymentTarget:
    iOS: "17.0"
packages:
  SharedKernel:
    path: Packages/SharedKernel
  Spec:
    path: Packages/Spec
  Training:
    path: Packages/Training
  History:
    path: Packages/History
  Plan:
    path: Packages/Plan
  Settings:
    path: Packages/Settings
targets:
  TrainingLa:
    type: application
    platform: iOS
    sources: [App]
    dependencies:
      - package: Spec
        products: [SpecDomain, SpecData, SpecPresentation]
      - package: Training
        products: [TrainingDomain, TrainingData, TrainingPresentation]
      - package: History
        products: [HistoryDomain, HistoryPresentation]
      - package: Plan
        products: [PlanDomain, PlanData, PlanPresentation]
      - package: Settings
        products: [SettingsPresentation]
      - package: SharedKernel
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.wly-p.training-la
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
  TrainingLaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: TrainingLa
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
schemes:
  TrainingLa:
    build:
      targets:
        TrainingLa: all
        TrainingLaUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets: [TrainingLaUITests]
