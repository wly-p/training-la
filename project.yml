# xcodegen 專案定義：`xcodegen generate` 重生 TrainingLa.xcodeproj（xcodeproj、App/Info.plist 皆不進版控）
name: TrainingLa
options:
  bundleIdPrefix: com.wly-p
  deploymentTarget:
    iOS: "17.0"
# 兩個軸獨立：debug/release ＝ 建置型別；dev/prod ＝ 環境（APP_ENV / bundle id / 顯示名稱）
# v0 單機版不含任何 API host；之後接同步再以注入變數餵入 base URL。
configs:
  Debug-Dev: debug
  Release-Dev: release
  Debug-Prod: debug
  Release-Prod: release
# Config.xcconfig：專案層級共用設定（目前是 TEST_DEVICE / TEST_HEADLESS），套用到全部
# build configuration，跟 Makefile 共用同一份（單一真實來源）。
# Xcode GUI 的模擬器下拉選單仍是互動式狀態、不會被這兩個值動態帶動，這是 Xcode 本身的限制；
# 這裡只保證專案的 Build Settings 讀得到跟 Makefile 一樣的值。
configFiles:
  Debug-Dev: Config.xcconfig
  Release-Dev: Config.xcconfig
  Debug-Prod: Config.xcconfig
  Release-Prod: Config.xcconfig
packages:
  SharedKernel:
    path: Packages/SharedKernel
  Spec:
    path: Packages/Spec
  Training:
    path: Packages/Training
  History:
    path: Packages/History
  Plan:
    path: Packages/Plan
  Settings:
    path: Packages/Settings
targets:
  TrainingLa:
    type: application
    platform: iOS
    sources: [App]
    info:
      path: App/Info.plist
      properties:
        # 由 per-config 的 build settings 注入、build 時展開；App 啟動讀成 AppEnvironment
        AppEnv: $(APP_ENV)
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        UILaunchScreen: {}
    dependencies:
      - package: Spec
        products: [SpecDomain, SpecData, SpecPresentation]
      - package: Training
        products: [TrainingDomain, TrainingData, TrainingPresentation]
      - package: History
        products: [HistoryDomain, HistoryPresentation]
      - package: Plan
        products: [PlanDomain, PlanData, PlanPresentation]
      - package: Settings
        products: [SettingsPresentation]
      - package: SharedKernel
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
      # 環境值放 per-config 的 target build settings（不是 xcconfig）：
      # PRODUCT_BUNDLE_IDENTIFIER 必須在此，Xcode 實機自動簽章才讀得到。
      configs:
        Debug-Dev: &envDev
          PRODUCT_BUNDLE_IDENTIFIER: com.wly-p.training-la.dev
          APP_ENV: dev
          APP_DISPLAY_NAME: "Training-la Dev"
        Release-Dev: *envDev
        Debug-Prod: &envProd
          PRODUCT_BUNDLE_IDENTIFIER: com.wly-p.training-la
          APP_ENV: prod
          APP_DISPLAY_NAME: "Training-la"
        Release-Prod: *envProd
  TrainingLaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: TrainingLa
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
schemes:
  # unit test 與 UITests 分成兩個獨立 Test Plan（UnitTests.xctestplan / UITests.xctestplan），
  # 在 Xcode 的 Test Navigator／scheme 的 Test Plan 下拉選單可以分開選、分開跑，不會混在一起。
  # 不能用 XcodeGen 的 test.targets 指到 SPM package 的 test target（XcodeGen 驗證會擋掉），
  # 用 Test Plan 才是 Xcode 支援 local package tests 的正規做法。
  TrainingLa-Dev:
    build:
      targets:
        TrainingLa: all
        TrainingLaUITests: [test]
    run:
      config: Debug-Dev
    test:
      config: Debug-Dev
      testPlans:
        - path: UnitTests.xctestplan
          defaultPlan: true
        - path: UITests.xctestplan
    profile:
      config: Release-Dev
    analyze:
      config: Debug-Dev
    archive:
      config: Release-Dev
  TrainingLa-Prod:
    build:
      targets:
        TrainingLa: all
        TrainingLaUITests: [test]
    run:
      config: Debug-Prod
    test:
      config: Debug-Prod
      testPlans:
        - path: UnitTests.xctestplan
          defaultPlan: true
        - path: UITests.xctestplan
    profile:
      config: Release-Prod
    analyze:
      config: Debug-Prod
    archive:
      config: Release-Prod
