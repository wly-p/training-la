# xcodegen 專案定義：`xcodegen generate` 重生 TrainingLa.xcodeproj（xcodeproj、App/Info.plist 皆不進版控）
name: TrainingLa
options:
  bundleIdPrefix: com.wly-p
  deploymentTarget:
    iOS: "17.0"
# 兩個軸獨立：debug/release ＝ 建置型別；dev/prod ＝ 環境（由 xcconfig 決定 API_HOST/APP_ENV）
configs:
  Debug-Dev: debug
  Release-Dev: release
  Debug-Prod: debug
  Release-Prod: release
packages:
  SharedKernel:
    path: Packages/SharedKernel
  Spec:
    path: Packages/Spec
  Training:
    path: Packages/Training
  History:
    path: Packages/History
  Plan:
    path: Packages/Plan
  Settings:
    path: Packages/Settings
targets:
  TrainingLa:
    type: application
    platform: iOS
    sources: [App]
    info:
      path: App/Info.plist
      properties:
        # 由 per-config 的 build settings 注入、build 時展開；App 啟動讀成 AppEnvironment
        APIBaseURL: https://$(API_HOST)
        AppEnv: $(APP_ENV)
        CFBundleDisplayName: $(APP_DISPLAY_NAME)
        UILaunchScreen: {}
    dependencies:
      - package: Spec
        products: [SpecDomain, SpecData, SpecPresentation]
      - package: Training
        products: [TrainingDomain, TrainingData, TrainingPresentation]
      - package: History
        products: [HistoryDomain, HistoryPresentation]
      - package: Plan
        products: [PlanDomain, PlanData, PlanPresentation]
      - package: Settings
        products: [SettingsPresentation]
      - package: SharedKernel
    settings:
      base:
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
      # 環境值放 per-config 的 target build settings（不是 xcconfig）：
      # PRODUCT_BUNDLE_IDENTIFIER 必須在此，Xcode 實機自動簽章才讀得到。
      configs:
        Debug-Dev: &envDev
          PRODUCT_BUNDLE_IDENTIFIER: com.wly-p.training-la.dev
          APP_ENV: dev
          API_HOST: training-la-api-dev.wly.lol
          APP_DISPLAY_NAME: "Training-la Dev"
        Release-Dev: *envDev
        Debug-Prod: &envProd
          PRODUCT_BUNDLE_IDENTIFIER: com.wly-p.training-la
          APP_ENV: prod
          API_HOST: training-la-api.wly.lol
          APP_DISPLAY_NAME: "Training-la"
        Release-Prod: *envProd
  TrainingLaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: TrainingLa
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
schemes:
  TrainingLa-Dev:
    build:
      targets:
        TrainingLa: all
        TrainingLaUITests: [test]
    run:
      config: Debug-Dev
    test:
      config: Debug-Dev
      targets: [TrainingLaUITests]
    profile:
      config: Release-Dev
    analyze:
      config: Debug-Dev
    archive:
      config: Release-Dev
  TrainingLa-Prod:
    build:
      targets:
        TrainingLa: all
        TrainingLaUITests: [test]
    run:
      config: Debug-Prod
    test:
      config: Debug-Prod
      targets: [TrainingLaUITests]
    profile:
      config: Release-Prod
    analyze:
      config: Debug-Prod
    archive:
      config: Release-Prod
